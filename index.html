<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>云离-Homepage</title>
  <meta name="description" content="云离的个人主页">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <style>
    :root{
      --bg1: #071026;
      --bg2: #061027;
      --surface: #071026;
      --text: #e6eef8;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --card-border: rgba(255,255,255,0.03);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text);transition:background-color .25s,color .25s}
    .site{min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between;padding:18px 28px}
    .brand{font-weight:700;font-size:26px}
    nav{display:flex;gap:12px;align-items:center}
    nav a{color:var(--muted);text-decoration:none;padding:8px 10px;border-radius:8px}
    nav a.primary{background:linear-gradient(180deg,var(--accent),#3b82f6);color:#fff}
    .hero{max-width:960px;margin:48px auto;padding:28px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);border-radius:12px;border:1px solid rgba(255,255,255,0.03)}
    .hero h1{margin:0 0 8px;font-size:32px}
    .hero p{margin:0;color:var(--muted)}
    .menu-btn{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted);padding:8px 10px;border-radius:8px;cursor:pointer;transition:color .18s,border-color .18s,background-color .18s}
    .nav-links{display:flex;gap:12px;align-items:center}
    .nav-links a{color:var(--muted);text-decoration:none;padding:8px 10px;border-radius:8px}
    .nav-links a.primary{background:linear-gradient(180deg,var(--accent),#3b82f6);color:#fff}
    section{max-width:960px;margin:20px auto;padding:0 18px}
    footer{padding:28px;text-align:center;color:var(--muted)}
    @media(max-width:720px){.hero h1{font-size:22px}}

    /* Light theme overrides (uses the .light flag on body) */
    body.light{
      --bg1:#f5f7fb;--bg2:#ffffff;--surface:#ffffff;--text:#0b1220;--muted:#6b7280;--accent:#2563eb;--card-border:rgba(2,6,23,0.06)
    }
    .hero, .site, section, footer{transition:background-color .2s,border-color .18s,color .18s}
    @keyframes popInUp {
      0% {opacity:0; transform:translateY(24px) scale(0.98)}
      60% {opacity:1; transform:translateY(-4px) scale(1.01)}
      100% {opacity:1; transform:translateY(0) scale(1)}
    }
    .preload .cards-grid .hero{
      opacity:0;
      transform:translateY(24px) scale(0.98);
    }
    .reveal .cards-grid .hero{
      opacity:0;
      animation: popInUp 1200ms ease-out forwards;
    }
    .reveal .cards-grid .hero:nth-child(1){animation-delay:140ms}
    .reveal .cards-grid .hero:nth-child(2){animation-delay:320ms}
    .reveal .cards-grid .hero:nth-child(3){animation-delay:500ms}
    .reveal .cards-grid .hero:nth-child(4){animation-delay:680ms}
    /* 背景层：图片（虚化）与渐变分层，图片位于更下方以避免影响文字 */
    .bg-image{position:fixed;inset:0;background-image:url("source/index_bg_image.png");background-size:cover;background-position:center;background-repeat:no-repeat;filter:blur(10px);transform:scale(1.03);z-index:-2;pointer-events:none}
    /* 背景与玻璃卡片样式 (渐变叠加在图片之上) */
    .bg{position:fixed;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;background:radial-gradient(1200px 600px at 20% 10%, rgba(96,165,250,.18), transparent 60%),radial-gradient(900px 500px at 70% 30%, rgba(167,139,250,.14), transparent 55%),linear-gradient(180deg, rgba(7,16,38,0.52), rgba(6,16,39,0.6));z-index:-1;pointer-events:none}
    .glass-card{max-width:960px;margin:32px auto;padding:20px 22px;border-radius:14px;background-color:rgba(255,255,255,0.12);-webkit-backdrop-filter:blur(16px) saturate(180%);backdrop-filter:blur(16px) saturate(180%);border:1px solid rgba(255,255,255,0.20);box-shadow:0 12px 30px rgba(2,6,23,0.35);color:var(--text);will-change:backdrop-filter;transform:translateZ(0)}
    @media (max-width:768px) and (hover:none){.glass-card{-webkit-backdrop-filter:blur(8px) saturate(160%);backdrop-filter:blur(8px) saturate(160%);background-color:rgba(255,255,255,0.16)}}
    @media (prefers-reduced-transparency: reduce){.glass-card{-webkit-backdrop-filter:none;backdrop-filter:none;background-color:rgba(255,255,255,0.92);color:#0b1220}}
    /* 进阶支持：只有支持 backdrop-filter 时启用虚化效果 */
    .glass-card{background-color:rgba(255,255,255,0.85);color:#0b1220}
    @supports ((-webkit-backdrop-filter: blur(1px)) or (backdrop-filter: blur(1px))){.glass-card{background-color:rgba(255,255,255,0.12);color:var(--text);-webkit-backdrop-filter:blur(16px) saturate(180%);backdrop-filter:blur(16px) saturate(180%)}}
  </style>
</head>
<body class="preload">
  <div class="bg-image" aria-hidden="true"></div>
  <div class="bg"></div>
  <div class="site">
    <header>
      <a href="index.html" class="brand">云离</a>
        <nav class="nav-links">
          <a href="blog.html">Blog</a>
          <a href="projects.html">Projects</a>
          <a href="about.html">About</a>
          <button id="themeSwitch" class="menu-btn" aria-label="切换主题" title="切换日/夜模式">🌙</button>
        </nav>
    </header>

    <main>
      <style>
        /* 四块卡片改为每块占一行（1 列），保持响应式 */
        .cards-grid{max-width:960px;margin:32px auto;display:grid;grid-template-columns:1fr;gap:18px;padding:0}
        .cards-grid .hero{margin:0;padding:28px;min-height:140px;border-radius:12px;border:1px solid rgba(255,255,255,0.03);background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent)}
        .cards-grid .hero h1{font-size:32px;margin-bottom:8px}
        /* 首块标题使用花体字体与渐变色，突出显示 */
        .cards-grid .hero:first-child h1{font-family:'Playfair Display',serif;font-size:44px;line-height:1.05;margin-bottom:6px;background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;color:transparent}
        .cards-grid .hero:first-child p{color:rgba(255,255,255,0.9)}
      </style>

      <section class="glass-card">
      <div class="cards-grid">
        <article class="hero">
          <h1>你好我是云离~</h1>
          <p>南方科技大学2024级本科生</p>
        </article>

        <article class="hero">
          <h1>网站说明</h1>
          <p>是李允臧的个人主页，随缘写写，分享点有趣的东西。</p>
          <p>上方导航可查看博客文章，项目等。也可以通过About的内容了解更多关于我~</p>
          <p style="margin-top:8px"><a href="https://github.com/yunli2024/yunli2024.github.io" style="color:var(--accent)">查看此网站仓库</a></p>
        </article>

        <article class="hero">
          <h1>联系我</h1>
          <p>有问题或合作请发邮件：<a href="mailto:12410922@mail.sustech.edu.cn" style="color:var(--accent)">12410922@mail.sustech.edu.cn</a></p>
          <p style="margin-top:8px">也可以在 <a href="https://github.com/yunli2024" style="color:var(--accent)">GitHub</a> 找到我。</p>
        </article>

        <article class="hero">
          <h1>统计量</h1>
          <p style="color:var(--muted)">来自所有的Markdown文章。</p>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:10px">
            <div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:10px">
              <div style="color:var(--muted);font-size:12px">活跃天数</div>
              <div id="stat-active-days" style="font-size:20px;font-weight:700">—</div>
            </div>
            <div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:10px">
              <div style="color:var(--muted);font-size:12px">上次更新时间</div>
              <div id="stat-last-update" style="font-size:20px;font-weight:700">—</div>
            </div>
            <div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:10px">
              <div style="color:var(--muted);font-size:12px">总字数</div>
              <div id="stat-total-words" style="font-size:20px;font-weight:700">—</div>
            </div>
          </div>
        </article>
      </div>
      </section>
    </main>

    <footer>
      © 云离-Homepage
    </footer>
  </div>

  <script>
    // Theme control (persist in localStorage)
    const themeSwitch = document.getElementById('themeSwitch');
    function applyTheme(theme){
      if(theme === 'light'){
        document.body.classList.add('light'); themeSwitch.textContent = '☀️';
      } else { document.body.classList.remove('light'); themeSwitch.textContent = '🌙'; }
      try{localStorage.setItem('site-theme', theme)}catch(e){}
    }
    (function(){
      let t = 'dark';
      try{const stored = localStorage.getItem('site-theme'); if(stored) t = stored;}catch(e){}
      applyTheme(t);
      if(themeSwitch){themeSwitch.addEventListener('click', ()=>{const cur = document.body.classList.contains('light') ? 'light' : 'dark'; applyTheme(cur === 'light' ? 'dark' : 'light');});}
    })();
  </script>
  <script>
    async function loadBlogStats(){
      const activeEl = document.getElementById('stat-active-days');
      const lastEl = document.getElementById('stat-last-update');
      const totalEl = document.getElementById('stat-total-words');
      try{
        const res = await fetch('posts/index.json');
        if(!res.ok) throw new Error('index.json not found');
        const idx = await res.json();
        if(!Array.isArray(idx) || idx.length === 0) throw new Error('empty index');

        const dates = idx.map(i => i.date).filter(Boolean);
        const uniqueDates = Array.from(new Set(dates));
        const lastDate = dates.sort().slice(-1)[0] || '—';

        const files = idx.map(i => i.file).filter(Boolean);
        let totalCount = 0;
        const contents = await Promise.all(files.map(async f => {
          const path = f.startsWith('/') ? f.slice(1) : f;
          const r = await fetch(path);
          return r.ok ? r.text() : '';
        }));
        contents.forEach(text => {
          const cleaned = text
            .replace(/```[\s\S]*?```/g, '')
            .replace(/`[^`]*`/g, '')
            .replace(/[#>*_~\-]+/g, '')
            .replace(/\s+/g, '');
          totalCount += cleaned.length;
        });

        if(activeEl) activeEl.textContent = String(uniqueDates.length || 0);
        if(lastEl) lastEl.textContent = lastDate;
        if(totalEl) totalEl.textContent = String(totalCount);
      }catch(e){
        if(activeEl) activeEl.textContent = '—';
        if(lastEl) lastEl.textContent = '—';
        if(totalEl) totalEl.textContent = '—';
      }
    }
    loadBlogStats();
  </script>
  <script>
    // Reveal animation on load
    window.addEventListener('load', () => {
      document.body.classList.add('reveal');
      document.body.classList.remove('preload');
    });
  </script>
</body>
</html>
