<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>文章 — 云离</title>
  <style>
    :root{--bg1:#eaf3ff;--bg2:#f8fbff;--surface:#f8fbff;--text:#0b1220;--muted:#64748b;--accent:#2563eb;--accent-soft:rgba(37,99,235,.12);--card-border:rgba(15,23,42,.08)}
    body{min-height:100vh;font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text);transition:background-color .25s,color .25s;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased}
    body.light{--bg1:#f6f8fb;--bg2:#fff;--surface:#fff;--text:#0b1220;--muted:#64748b;--accent:#1d4ed8;--accent-soft:rgba(29,78,216,.1);--card-border:rgba(15,23,42,.08)}
    .wrap{max-width:980px;margin:42px auto 24px;padding:20px;position:relative}
    .glass-card{margin-top:16px;padding:24px 26px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,.86),rgba(248,251,255,.78));-webkit-backdrop-filter:blur(14px) saturate(165%);backdrop-filter:blur(14px) saturate(165%);border:1px solid var(--card-border);box-shadow:0 18px 48px rgba(37,99,235,.13),0 3px 12px rgba(15,23,42,.08)}
    @media (prefers-reduced-transparency: reduce){.glass-card{-webkit-backdrop-filter:none;backdrop-filter:none;background-color:#ffffff}}
    a{color:var(--accent)}
    footer{padding:28px;text-align:center;color:var(--muted)}
    .post-back{display:inline-flex;align-items:center;gap:.35em;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.68);border:1px solid var(--card-border);box-shadow:0 8px 24px rgba(37,99,235,.09);text-decoration:none;font-weight:650}
    .post-back:hover{background:#fff;text-decoration:none}
    .theme-toggle{position:fixed;right:18px;top:18px;background:rgba(255,255,255,.78);color:var(--text);border:1px solid var(--card-border);padding:9px;border-radius:10px;cursor:pointer;box-shadow:0 10px 26px rgba(15,23,42,.1)}
    .bg{position:fixed;inset:0;background:radial-gradient(900px 420px at 18% 5%, rgba(96,165,250,.2), transparent 60%),radial-gradient(760px 440px at 82% 18%, rgba(45,212,191,.13), transparent 56%),linear-gradient(180deg,var(--bg1),var(--bg2));z-index:-1}
    #content{
      box-sizing:border-box;
      max-width:100%;
      padding:46px 52px;
      font-size:18px;
      line-height:2.04;
      overflow-wrap:break-word;
      letter-spacing:0;
    }
    #content *,
    #content *::before,
    #content *::after{box-sizing:border-box}
    #content > :first-child{margin-top:0}
    #content > :last-child{margin-bottom:0}
    #content h1,
    #content h2,
    #content h3,
    #content h4{
      line-height:1.34;
      margin:2.25em 0 1em;
      scroll-margin-top:32px;
    }
    #content h1{font-size:2.05rem}
    #content h2{font-size:1.75rem}
    #content h3{font-size:1.45rem}
    #content h4{font-size:1.2rem}
    #content p{margin:1.22em 0}
    #content a{text-underline-offset:.22em;text-decoration-thickness:.08em}
    #content strong{font-weight:800;color:#0f172a}
    #content ul,
    #content ol{
      margin:1.25em 0 1.55em;
      padding-left:1.72em;
    }
    #content li{
      margin:.95em 0;
      padding-left:.18em;
    }
    #content li > p{margin:.62em 0}
    #content blockquote{
      margin:1.7em 0;
      padding:1em 1.25em;
      border-left:4px solid rgba(59,130,246,.45);
      color:#263247;
      background:linear-gradient(90deg,rgba(59,130,246,.11),rgba(59,130,246,.05));
    }
    #content pre{
      margin:1.7em 0;
      padding:1.05em 1.2em;
      overflow-x:auto;
      line-height:1.78;
      border-radius:8px;
      background:rgba(15,23,42,.06);
    }
    #content code{
      padding:.1em .28em;
      border-radius:5px;
      background:rgba(15,23,42,.07);
    }
    #content pre code{
      padding:0;
      background:transparent;
    }
    #content hr{
      border:0;
      height:1px;
      margin:2.4em 0;
      background:linear-gradient(90deg,transparent,rgba(37,99,235,.26),transparent);
    }
    #content table{
      width:100%;
      margin:1.7em 0;
      border-collapse:collapse;
      display:block;
      overflow-x:auto;
    }
    #content th,
    #content td{
      padding:.7em .85em;
      border:1px solid rgba(15,23,42,.1);
    }
    #content th{
      background:var(--accent-soft);
      text-align:left;
    }
    /* Responsive images inside article content: limit size, keep aspect ratio, center */
    #content img{
      max-width:100%;
      height:auto;
      max-height:70vh;
      display:block;
      margin:28px auto;
      border-radius:8px;
      box-shadow:0 6px 18px rgba(2,6,23,0.08);
      object-fit:contain;
    }
    @media (max-width:820px){
      .wrap{margin:24px auto 16px;padding:12px}
      .post-back{padding:7px 10px}
      #content{
        padding:30px 22px;
        font-size:16.5px;
        line-height:1.92;
        overflow-wrap:anywhere;
      }
      #content h1{font-size:1.72rem}
      #content h2{font-size:1.48rem}
      #content h3{font-size:1.28rem}
      #content h4{font-size:1.12rem}
      #content ul,
      #content ol{padding-left:1.42em}
      #content li{margin:.82em 0}
      #content img{margin:18px auto;}
    }
    #content mjx-container{
      max-width:100%;
    }
    #content mjx-container[display="true"]{
      overflow-x:auto;
      overflow-y:hidden;
      padding:.35em 0;
    }
  </style>
  <link rel="stylesheet" href="source/ui-polish.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      svg: {fontCache: 'global'}
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
  <div class="bg"></div>
  <div class="wrap">
    <a class="post-back" href="blog.html">← 返回博客</a>
    <article id="content" class="glass-card">  加载中…</article>
    <div id="likePanel" class="glass-card" style="margin-top:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <button id="likeBtn" style="padding:8px 14px;border-radius:999px;border:1px solid rgba(11,18,32,0.08);background:linear-gradient(180deg,#fff,rgba(255,255,255,0.7));cursor:pointer">👍 点赞</button>
      <span id="likeCount" style="color:var(--muted)">likes: 0</span>
      <span id="likeMsg" style="color:var(--muted)"></span>
    </div>
  </div>

  <footer>© 云离-post</footer>

  <script>
    function qs(name){const u=new URL(location.href);return u.searchParams.get(name)}
    function escapeHtml(value){
      return value.replace(/[&<>]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]));
    }
    function protectMath(markdown){
      const values = [];
      const stash = value => {
        const key = `@@MATH_${values.length}@@`;
        values.push(value);
        return key;
      };
      const protectText = text => text
        .replace(/\$\$([\s\S]+?)\$\$/g, (_, body) => stash(`$$${body}$$`))
        .replace(/\\\[([\s\S]+?)\\\]/g, (_, body) => stash(`\\[${body}\\]`))
        .replace(/\\\(([\s\S]+?)\\\)/g, (_, body) => stash(`\\(${body}\\)`))
        .replace(/(^|[^\\$])\$([^\n$]+?)\$/g, (_, prefix, body) => `${prefix}${stash(`$${body}$`)}`);
      const protectedMarkdown = markdown
        .split(/(```[\s\S]*?```|`[^`\n]*`)/g)
        .map(part => part.startsWith('`') ? part : protectText(part))
        .join('');
      return {
        markdown: protectedMarkdown,
        restore(html){
          return values.reduce((output, value, index) => (
            output.replaceAll(`@@MATH_${index}@@`, escapeHtml(value))
          ), html);
        }
      };
    }
    async function typesetMath(el){
      if(!window.MathJax || !el) return;
      try{
        if(MathJax.startup && MathJax.startup.promise) await MathJax.startup.promise;
        if(MathJax.typesetClear) MathJax.typesetClear([el]);
        if(MathJax.typesetPromise) await MathJax.typesetPromise([el]);
      }catch(e){
        console.warn('MathJax render failed', e);
      }
    }
    async function load(){
      const content = document.getElementById('content');
      let file = qs('file');
      if(!file){content.innerText='未指定文章文件';return}
      try{ file = decodeURIComponent(file); }catch(e){}

      // Allow paths like 'posts/xxx.md' or '/posts/xxx.md'
      if(file.startsWith('/')) file = file.slice(1);
      if(!file.startsWith('posts/')){content.innerText='文章路径不合法（必须在 posts/ 目录下）';console.error('Invalid post path:', file);return}

      try{
        // try multiple relative forms to avoid absolute-path issues
        const candidates = [file, './' + file, '/' + file, location.origin + '/' + file];
        let res = null;
        for(const u of candidates){
          try{ res = await fetch(u); if(res && res.ok) break }catch(err){ console.warn('fetch candidate failed', u, err) }
        }
        if(!res || !res.ok){
          const status = res ? `${res.status} ${res.statusText}` : 'network error';
          const msg = `读取文章失败：${status}`;
          content.innerText = msg;
          console.error('All fetch candidates failed for', file, res);
          return;
        }
        const md = await res.text();
        const math = protectMath(md);
        content.innerHTML = math.restore(marked.parse(math.markdown));
        await typesetMath(content);
      }catch(e){
        content.innerText='读取文章失败（网络或跨域错误）';
        console.error('Fetch error for', file, e);
      }
    }
    load();
  </script>
  <script>
    const LIKE_API = 'https://homepagelike.12410922.workers.dev/like';
    async function refreshLikes(file){
      if(!file) return;
      const res = await fetch(`${LIKE_API}?id=${encodeURIComponent(file)}`);
      if(res.ok){
        const data = await res.json();
        document.getElementById('likeCount').textContent = `likes: ${data.likes}`;
      }
    }
    async function sendLike(file){
      if(!file) return;
      const btn = document.getElementById('likeBtn');
      const msg = document.getElementById('likeMsg');
      if(btn){btn.disabled = true; btn.textContent = '已点赞';}
      const res = await fetch(`${LIKE_API}?id=${encodeURIComponent(file)}`, {method:'POST'});
      if(res.ok){
        const data = await res.json();
        document.getElementById('likeCount').textContent = `likes: ${data.likes}`;
        if(data.throttled && msg){
          msg.textContent = '操作太快啦';
        } else if(msg){
          msg.textContent = '';
        }
      }
      setTimeout(()=>{ if(btn){btn.disabled = false; btn.textContent = '👍 点赞';} }, 800);
    }
    (function(){
      let file = qs('file');
      if(!file) return;
      try{ file = decodeURIComponent(file); }catch(e){}
      if(file.startsWith('/')) file = file.slice(1);
      const btn = document.getElementById('likeBtn');
      refreshLikes(file);
      if(btn){btn.addEventListener('click', ()=> sendLike(file));}
    })();
  </script>
  <button id="globalThemeBtn" class="theme-toggle" title="切换日/夜模式">🌙</button>
  <script>
    const gBtn = document.getElementById('globalThemeBtn');
    function applyThemePage(t){ if(t==='light') document.body.classList.add('light'); else document.body.classList.remove('light'); gBtn.textContent = document.body.classList.contains('light') ? '☀️' : '🌙'; try{localStorage.setItem('site-theme', t)}catch(e){} }
    (function(){ let t='dark'; try{const s=localStorage.getItem('site-theme'); if(s) t=s;}catch(e){} applyThemePage(t); gBtn.addEventListener('click', ()=>{const cur=document.body.classList.contains('light')?'light':'dark'; applyThemePage(cur==='light'?'dark':'light');}); })();
  </script>
